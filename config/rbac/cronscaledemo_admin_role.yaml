# This rule is not used by the project op-cron-scale itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over op-cron-scale.op-cron-scale.example.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: op-cron-scale
    app.kubernetes.io/managed-by: kustomize
  name: CronScaler-admin-role
rules:
- apiGroups:
  - op-cron-scale.op-cron-scale.example.com
  resources:
  - cronscalers
  verbs:
  - '*'
- apiGroups:
  - op-cron-scale.op-cron-scale.example.com
  resources:
  - cronscalers/status
  verbs:
  - get
