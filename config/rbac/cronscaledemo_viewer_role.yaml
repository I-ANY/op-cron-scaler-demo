# This rule is not used by the project op-cron-scale itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to op-cron-scale.op-cron-scale.example.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: op-cron-scale
    app.kubernetes.io/managed-by: kustomize
  name: CronScaler-viewer-role
rules:
- apiGroups:
  - op-cron-scale.op-cron-scale.example.com
  resources:
  - cronscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - op-cron-scale.op-cron-scale.example.com
  resources:
  - cronscalers/status
  verbs:
  - get
